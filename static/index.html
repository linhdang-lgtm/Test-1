<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Racket Sports Inventory</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Racket Sports Inventory</h1>
        <p class="subtle">Manage rackets, accessories, and stock levels in one place.</p>
        <form id="add-form" class="form-grid">
          <input id="name" type="text" placeholder="Product name" required />
          <input id="quantity" type="number" min="0" placeholder="Quantity" required />
          <input id="price" type="number" min="0" step="0.01" placeholder="Price" required />
          <button type="submit">Add Product</button>
        </form>
      </section>

      <section class="card">
        <div class="table-title">
          <h2>Products</h2>
          <span id="count" class="pill"></span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="products"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="/app.js" defer></script>
  </body>
</html>
